name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build .app bundle
        run: ./scripts/build-app.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMD-macOS
          path: .build/SuperMD.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/SuperMD.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `SuperMD.zip`, unzip it, and drag `SuperMD.app` into `/Applications`.
            2. First launch (unsigned app): right-click `SuperMD.app` → **Open** → **Open** in the dialog.
               Or run once in Terminal: `xattr -dr com.apple.quarantine /Applications/SuperMD.app`
